<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>GPU 학습 콘솔</title>
<style>
  html, body { height: 100%; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #0f1419; color: #d8dee6; display: flex; flex-direction: column; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; width: 100%; box-sizing: border-box; }
  h1 { font-size: 18px; margin: 8px 0 16px; }
  h2 { font-size: 14px; color: #8fa1b3; margin: 20px 0 8px; text-transform: uppercase; letter-spacing: .05em; }
  .card { background: #1a2028; border: 1px solid #2a3442; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid #2a3442; }
  th { color: #8fa1b3; font-weight: 600; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pill.up { background: #1d4a2c; color: #6fdc8f; }
  .pill.down { background: #4a1d1d; color: #dc6f6f; }
  .pill.off { background: #2a3442; color: #8fa1b3; }
  button { background: #2a3442; color: #d8dee6; border: 1px solid #3a4a5c; border-radius: 5px; padding: 3px 9px; cursor: pointer; font-size: 12px; }
  button:hover { background: #3a4a5c; }
  button.warn { border-color: #7a4a3a; }
  button.tab { padding: 6px 14px; font-size: 13px; }
  button.tab.active { background: #4a9eda; color: #0f1419; border-color: #4a9eda; font-weight: 600; }
  button.srv { padding: 5px 12px; }
  button.srv.active { background: #4a9eda; color: #0f1419; border-color: #4a9eda; font-weight: 600; }
  input { background: #10151c; color: #d8dee6; border: 1px solid #3a4a5c; border-radius: 5px; padding: 5px 8px; font-size: 13px; }
  .muted { color: #6b7a8c; font-size: 12px; }
  #err { color: #dc6f6f; font-size: 12px; min-height: 16px; }
  label { display: block; font-size: 12px; color: #8fa1b3; margin-bottom: 3px; }
  .field { display: inline-block; margin: 0 8px 8px 0; }
  .tabs { display: flex; gap: 8px; margin-bottom: 4px; }
  .tabpage { display: none; }
  .tabpage.active { display: block; }
  #dashPage.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  #dashFrame { flex: 1; width: 100%; border: 1px solid #2a3442; border-radius: 8px; min-height: 60vh; background: #fff; }
</style>
</head>
<body>
<div class="wrap" style="display:flex; flex-direction:column; flex:1; min-height:0;">
  <h1>GPU 학습 콘솔</h1>
  <div class="tabs">
    <button class="tab active" id="tabBtnDash" onclick="showTab('dash')">대시보드</button>
    <button class="tab" id="tabBtnManage" onclick="showTab('manage')">서버 관리</button>
  </div>

  <div class="tabpage active" id="dashPage">
    <div id="dashServerBar" class="card" style="padding:8px 12px;"></div>
    <div id="dashEmpty" class="card muted" style="display:none;">
      연결된 GPU 서버가 없습니다. <button onclick="showTab('manage')">서버 관리</button> 탭에서 먼저 등록하세요.
    </div>
    <iframe id="dashFrame" style="display:none;"></iframe>
  </div>

  <div class="tabpage" id="managePage">
    <h2>등록된 서버</h2>
    <div class="card">
      <table id="srvTable"><thead>
        <tr><th>이름</th><th>접속</th><th>포워딩 / 상태</th><th style="width:110px"></th></tr>
      </thead><tbody></tbody></table>
    </div>

    <h2>서버 추가</h2>
    <div class="card">
      <div class="field" style="display:block; margin-bottom:10px;">
        <label style="display:inline; color:#d8dee6;">
          <input type="checkbox" id="fIsLocal" onchange="toggleLocalFields()"> 이 PC (로컬, SSH 불필요 — 이 PC 자체에 GPU 학습 대시보드가 떠 있는 경우)
        </label>
      </div>
      <div>
        <div class="field"><label>이름</label><input id="fName" placeholder="gpu-server" style="width:140px"></div>
        <div class="field"><label>Host / IP</label><input id="fHost" placeholder="1.2.3.4" style="width:140px"></div>
        <div class="field"><label>SSH 계정</label><input id="fUser" placeholder="ubuntu" style="width:120px"></div>
        <div class="field"><label>SSH 포트</label><input id="fPort" type="number" placeholder="22" style="width:80px"></div>
        <div class="field"><label id="fLocalLabel">로컬 포트</label><input id="fLocal" type="number" placeholder="8080" style="width:90px"></div>
        <div class="field"><label>원격 포트</label><input id="fRemote" type="number" placeholder="(로컬과 동일)" style="width:110px"></div>
        <div class="field" id="fPasswordField"><label>비밀번호 (선택)</label><input id="fPassword" type="password" placeholder="SSH 키 대신 사용" style="width:150px"></div>
      </div>
      <button onclick="addServer()">추가</button>
      <div id="err"></div>
      <div class="muted" id="addHint">대상 서버에 SSH 키 인증이 설정돼 있어야 함 (ssh-copy-id). 등록 후 5초 내 자동 연결.</div>
      <div class="muted">비밀번호를 입력하면 SSH 키 대신 그 비밀번호로 접속 — servers.json에 평문 저장되니 신뢰 가능한 개인 PC에서만 사용.</div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let selectedPort = null;   // 대시보드 탭에서 보고 있는 로컬 포트
let userPicked = false;    // 사용자가 직접 서버를 선택했는지 (자동 전환 방지)

function showTab(name) {
  $('#tabBtnDash').classList.toggle('active', name === 'dash');
  $('#tabBtnManage').classList.toggle('active', name === 'manage');
  $('#dashPage').classList.toggle('active', name === 'dash');
  $('#managePage').classList.toggle('active', name === 'manage');
}

function tunnelKey(s, f) {
  if (s.local) return `local:${f.local}`;
  const target = (s.user ? s.user + '@' : '') + s.host;
  return `${target}:${s.port} L${f.local}->${f.remote}`;
}

function toggleLocalFields() {
  const isLocal = $('#fIsLocal').checked;
  ['fHost', 'fUser', 'fPort', 'fRemote', 'fPassword'].forEach(id => { $('#' + id).disabled = isLocal; });
  $('#fLocalLabel').textContent = isLocal ? '포트' : '로컬 포트';
  $('#fPasswordField').style.display = isLocal ? 'none' : 'inline-block';
  $('#addHint').textContent = isLocal
    ? '이 PC에서 직접 도는 대시보드 포트를 등록 — SSH/터널 없이 바로 접근.'
    : '대상 서버에 SSH 키 인증이 설정돼 있어야 함 (ssh-copy-id). 등록 후 5초 내 자동 연결.';
}

async function addServer() {
  const isLocal = $('#fIsLocal').checked;
  const body = isLocal
    ? {name: $('#fName').value, is_local: true, local: $('#fLocal').value}
    : {name: $('#fName').value, host: $('#fHost').value, user: $('#fUser').value,
       port: $('#fPort').value, local: $('#fLocal').value, remote: $('#fRemote').value,
       password: $('#fPassword').value};
  const r = await fetch('/api/servers', {method: 'POST',
    headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
  const j = await r.json();
  $('#err').textContent = j.ok ? '' : (j.error || 'error');
  if (j.ok) { ['fName','fHost','fUser','fPort','fLocal','fRemote','fPassword'].forEach(id => $('#' + id).value = ''); }
  refresh();
}

async function toggleServer(idx) {
  await fetch(`/api/servers/${idx}/toggle`, {method: 'POST'});
  refresh();
}

async function removeServer(idx, name) {
  if (!confirm(`${name} 삭제?`)) return;
  await fetch(`/api/servers/${idx}`, {method: 'DELETE'});
  refresh();
}

function pickDashboard(port) {
  selectedPort = port;
  userPicked = true;
  renderDashFrame();
}

function renderDashFrame() {
  const frame = $('#dashFrame');
  if (selectedPort) {
    frame.style.display = '';
    $('#dashEmpty').style.display = 'none';
    const wantSrc = `http://localhost:${selectedPort}/`;
    if (frame.dataset.port !== String(selectedPort)) {
      frame.src = wantSrc;
      frame.dataset.port = String(selectedPort);
    }
  } else {
    frame.style.display = 'none';
    $('#dashEmpty').style.display = '';
  }
}

async function refresh() {
  let s;
  try { s = await (await fetch('/api/status')).json(); }
  catch (e) { return; }

  const aliveServers = [];
  $('#srvTable tbody').innerHTML = s.servers.map(srv => {
    const forwards = srv.forwards.map(f => {
      const key = tunnelKey(srv, f);
      const t = s.tunnels[key];
      let pill;
      if (!srv.enabled) pill = '<span class="pill off">꺼짐</span>';
      else if (t && t.alive) { pill = '<span class="pill up">연결됨</span>'; aliveServers.push({name: srv.name, port: f.local}); }
      else if (t) pill = srv.local ? '<span class="pill down">응답 없음</span>' : `<span class="pill down">재시도 ${t.retry_in}s</span>`;
      else pill = '<span class="pill down">대기</span>';
      const label = srv.local ? `포트 ${f.local}` : `L${f.local} → ${f.remote}`;
      return `<div>${label} ${pill}</div>`;
    }).join('');
    const authBadge = !srv.local ? ` <span class="muted">${srv.auth === 'password' ? '🔒 비밀번호' : '🔑 키'}</span>` : '';
    return `<tr>
      <td><b>${srv.name}</b></td>
      <td class="muted">${srv.local ? '이 PC (로컬)' : `${srv.user ? srv.user + '@' : ''}${srv.host}:${srv.port}`}${authBadge}</td>
      <td>${forwards}</td>
      <td>
        <button onclick="toggleServer(${srv.idx})">${srv.enabled ? '끄기' : '켜기'}</button>
        <button class="warn" onclick="removeServer(${srv.idx}, '${srv.name}')">✕</button>
      </td></tr>`;
  }).join('') || '<tr><td colspan="4" class="muted">등록된 서버 없음</td></tr>';

  // 대시보드 탭: 연결된 서버 선택 바
  const stillAlive = aliveServers.some(a => a.port === selectedPort);
  if (!stillAlive) { selectedPort = null; userPicked = false; }
  if (!userPicked && !selectedPort && aliveServers.length) { selectedPort = aliveServers[0].port; }

  $('#dashServerBar').innerHTML = aliveServers.length
    ? aliveServers.map(a => `<button class="srv ${a.port === selectedPort ? 'active' : ''}"
        onclick="pickDashboard(${a.port})">${a.name} <span class="muted">:${a.port}</span></button>`).join(' ')
    : '<span class="muted">연결된 서버 없음</span>';

  renderDashFrame();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
